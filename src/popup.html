<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Studio</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <div>
          <h1>Page Studio</h1>
          <p id="statusText">Ready</p>
        </div>
        <span id="stateDot" class="state-dot" aria-hidden="true"></span>
      </header>

      <label class="field" for="editorSelect">
        <span>Editor</span>
        <select id="editorSelect">
          <option value="native">Native Inline</option>
          <option value="tinymce">TinyMCE Inline</option>
          <option value="tiptap">Tiptap Inline</option>
          <option value="ckeditor">CKEditor Inline</option>
          <option value="html">HTML Source</option>
          <option value="plain">Plain Text</option>
          <option value="page">Whole Page</option>
        </select>
      </label>

      <section class="switches" aria-label="Editor preferences">
        <label>
          <input id="autosaveInput" type="checkbox">
          <span>Drafts</span>
        </label>
        <label>
          <input id="outlinesInput" type="checkbox">
          <span>Outlines</span>
        </label>
        <label>
          <input id="sanitizeInput" type="checkbox">
          <span>Sanitize</span>
        </label>
      </section>

      <button id="toggleButton" class="primary" type="button">Start Editing</button>
      <button id="openCkPageButton" class="secondary" type="button">Edit Full Page in CKEditor</button>
      <button id="clearDraftsButton" class="secondary" type="button">Clear Drafts</button>

      <section class="notes-panel" aria-label="Notes">
        <div class="notes-panel__head">
          <span id="notesTitle">Notes</span>
          <button id="notesClearAll" class="link-button" type="button" hidden>Clear all</button>
        </div>
        <button id="newNoteButton" class="new-note" type="button">
          <span aria-hidden="true">+</span>
          <span>New Note</span>
        </button>
        <ul id="noteList" class="note-items"></ul>
        <p id="notesEmpty" class="notes-empty">No notes yet. Click <strong>New Note</strong> to start.</p>
      </section>
    </main>

    <div id="editorModal" class="modal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__card" role="dialog" aria-modal="true" aria-label="Choose editor">
        <div class="modal__head">
          <strong>New note</strong>
          <button class="modal__close" type="button" data-close aria-label="Close">×</button>
        </div>
        <p class="modal__sub">Where do you want to write?</p>
        <div class="modal__options">
          <button class="opt" type="button" data-editor="notepad">
            <span class="opt__icon">🌐</span>
            <span class="opt__text">
              <span class="opt__title">notepad.pw</span>
              <span class="opt__desc">Open a fresh online notepad page</span>
            </span>
          </button>
          <button class="opt" type="button" data-editor="tinymce">
            <span class="opt__icon">✍️</span>
            <span class="opt__text">
              <span class="opt__title">TinyMCE</span>
              <span class="opt__desc">Rich text editor with a toolbar</span>
            </span>
          </button>
          <button class="opt" type="button" data-editor="ckeditor">
            <span class="opt__icon">📄</span>
            <span class="opt__text">
              <span class="opt__title">CKEditor</span>
              <span class="opt__desc">Rich text editor with a toolbar</span>
            </span>
          </button>
          <button class="opt" type="button" data-editor="tiptap">
            <span class="opt__icon">⚡</span>
            <span class="opt__text">
              <span class="opt__title">Tiptap</span>
              <span class="opt__desc">Minimal keyboard-first editor</span>
            </span>
          </button>
          <button class="opt" type="button" data-editor="jck">
            <span class="opt__icon">🧱</span>
            <span class="opt__text">
              <span class="opt__title">JCK</span>
              <span class="opt__desc">JCK Editor (CKEditor-based)</span>
            </span>
          </button>
          <button class="opt" type="button" data-editor="plain">
            <span class="opt__icon">📝</span>
            <span class="opt__text">
              <span class="opt__title">Plain Text</span>
              <span class="opt__desc">A simple distraction-free notepad</span>
            </span>
          </button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
